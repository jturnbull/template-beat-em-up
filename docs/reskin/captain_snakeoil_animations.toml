[global]
base_task = "docs/reskin/tasks/characters/enemies/captain_snakeoil/idle/idle_00.md"
anchor_image = "outputs/reskin/captain_snakeoil/anchor/anchor_base.png"
anchor_framed = "outputs/reskin/captain_snakeoil/anchor/anchor_framed.png"
scale_ref = "outputs/reskin/captain_snakeoil/anchor/anchor_base.png"
base_source_pad_pct = 0.18
base_source_pad_color = "#00b140"
base_prompt_append = "full character and sword must be completely visible and entirely inside the image canvas, leave at least 12% empty green margin on all sides, do not crop or cut off any body part, hand, hat, sword, or accessory at the image edges"
resolution = "720p"
video_model = "bytedance/seedance-2.0/fast/image-to-video"
video_variants = 4
negative = "blurry, cropped, background, watermark, extra limbs, multiple characters"
extract_fps = 12
contact_cols = 10
contact_scale = 1
frames_dir = "outputs/reskin/captain_snakeoil/frames"
video_dir = "outputs/reskin/captain_snakeoil/videos"
padded_dir = "outputs/reskin/captain_snakeoil/seeds"
constraints = "side-view 2D sprite, no camera movement, no zoom, solid #00b140 background, keep character fully inside the white border frame with at least 8% margin on all sides, keep all VFX inside the frame and away from the border, space-galleon pirate captain aesthetic"
pad_color = "#00b140"
frame_guide = true
frame_guide_color = "#ffffff"
frame_guide_thickness = 4
frame_guide_match = "characters/enemies/tax_man/resources/sprites/idle/idle_00.png"
anchor_bbox_pad_pct = 0.0
anchor_scale_mult = 1.0
output_width = 2
scale_multiplier = 1

active = [
	'attack_combo'
]

[consistency_groups]
seated_block = ["seated_engage", "seated_laugh", "seated_drink", "seated_swirl"]

[[animation]]
name = "idle"
prompt_variations = [
  "Character stands in a confident sword-duelist idle stance, subtle breathing, in-place without translation, start and end matching idle pose for seamless loop",
  "Character idle in place with slight weight shifts and sword-hand readiness, feet planted, no translation, seamless loop",
  "Character idle in place, cape and coat settle subtly, sword hand poised, no translation, start and end matching idle",
  "Character idle in place, villainous composure, grounded stance, no translation, seamless loop"
]
duration = 3
frame_count = 8
frame_indices = "8-15"
prefix = "idle_"
dest_dir = "characters/enemies/tax_man/resources/sprites/idle"
match = "characters/enemies/tax_man/resources/sprites/idle/idle_00.png"

[[animation]]
name = "walk"
prompt_variations = [
  "Character treadmill walk in place, deliberate boss stride, sword arm balanced, no translation, start and end matching walk pose, anatomy lock: exactly one natural leg and one wooden peg leg only",
  "Character walks in place with measured, threatening steps, feet stay on baseline, no translation, seamless loop, maintain exact peg-leg anatomy: one human leg and one peg leg only",
  "Character treadmill walk in place, heavy footfall cadence, cloak movement but no body translation, preserve anatomy: one peg leg only and one natural leg only",
  "Character in-place walk cycle, side-view readable silhouette, no translation, start and end matching, enforce single peg leg setup (no extra legs or feet)"
]
negative = "blurry, cropped, background, watermark, extra limbs, multiple characters, extra legs, extra feet, duplicate leg, duplicate foot, two normal feet, two normal legs, second peg leg, replace peg leg with normal foot, anatomy mutation"
duration = 3
frame_count = 16
frame_indices = "3-18"
prefix = "walk_"
dest_dir = "characters/enemies/tax_man/resources/sprites/walk"
match = "characters/enemies/tax_man/resources/sprites/walk/walk_00.png"

[[animation]]
name = "turn"
prompt_variations = [
  "Character pivots in place from facing right to facing left, short footwork turn, no translation",
  "Character quick in-place turn with sword hand guarding, feet stay on baseline, no translation",
  "Character rotates in place with minimal shuffle, no translation",
  "Character step-pivot turn in place, same proportions and silhouette, no translation"
]
