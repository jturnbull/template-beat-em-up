[global]
# Task used to generate the initial idle still (4 options) via fal_reskin_generate.py.
base_task = "docs/reskin/tasks/characters/playable/mark/idle/idle_00.md"
# Base anchor still (greenscreen) used for all animations.
anchor_image = "outputs/reskin/mark/anchor/anchor_base.png"
# Framed anchor used for video seeding (has 2px white border).
anchor_framed = "outputs/reskin/mark/anchor/anchor_framed.png"
# Scale reference used to compute a single scale factor for all frames.
scale_ref = "outputs/reskin/mark/anchor/anchor_base.png"
# Defaults
resolution = "1080p"
video_model = "fal-ai/kling-video/o1/image-to-video"
video_variants = 4
negative = "blurry, cropped, background, watermark, extra limbs, multiple characters"
extract_fps = 12
contact_cols = 10
contact_scale = 1
# Where to write extracted frames
frames_dir = "outputs/reskin/mark/frames"
video_dir = "outputs/reskin/mark/videos"
padded_dir = "outputs/reskin/mark/seeds"
# Global prompt constraints appended to every animation prompt
constraints = "side-view 2D sprite, no camera movement, no zoom, solid #00b140 background, keep character centered within the bordered frame and never cross the white border, keep all VFX/particles inside the border"
# Greenscreen pad color for per-animation canvas padding
pad_color = "#00b140"
# Frame guide settings (fixed canvas + white border).
frame_guide = true
frame_guide_color = "#ffffff"
frame_guide_thickness = 2
# Use current P2 idle sprite for size + baseline
frame_guide_match = "characters/playable/mark/resources/sprites/idle/idle_00.png"
# Extra breathing room for video seeds (percent of bbox size).
anchor_bbox_pad_pct = 0.08
# Output filename zero-pad width for numbered sprites
output_width = 2
# Global scale multiplier (1.0 = match baseline size)
scale_multiplier = 0.9

# Active list (if non-empty, only these run).
active = [
 "idle",
 "walk",
 "turn",
 "hurt_mid",
 "hurt_high",
 "jump",
 "air_attack",
 "punch1",
 "punch2",
 "punch3",
 "knockout",
]

# =============================
# Playable character (Groc/P2)
# =============================

[[animation]]
name = "idle"
prompt_variations = [
  "Character stands in a heavy brawler stance, subtle breathing, faint blue flame aura flickering around fists, in-place without translation, start and end matching idle pose for seamless loop",
  "Character idle in place with a wide, powerful stance, slight weight shift, subtle blue flame aura around hands, a few red ember sparks, no translation, seamless loop",
  "Character idle in place, big chest/shoulder rise, grounded and steady, blue flame aura pulses briefly then settles, no translation, start and end matching idle",
  "Character idle in place, slow brawler sway, feet planted, blue flame flicker and occasional red ember sparks, no translation, seamless loop"
]
duration = 3
frame_count = 4
frame_indices = "6,25,29,32"
prefix = "idle_"
dest_dir = "characters/playable/mark/resources/sprites/idle"
match = "characters/playable/mark/resources/sprites/idle/idle_00.png"

[[animation]]
name = "walk"
# Workaround language: "treadmill" keeps in-place motion for walk cycles.
prompt_variations = [
  "Character walks on a treadmill in place, heavy brawler steps, blue flame aura flickering around fists, feet on the same baseline, no translation, start and end matching walk pose",
  "Character treadmill walk in place, powerful arm swing, subtle blue flame streaks trailing from hands, no translation, seamless loop",
  "Character walks on a treadmill in place, heavy stomp cadence, brief red ember sparks with each step, no translation",
  "Character treadmill walk in place, grounded and weighty, blue flame aura pulses on impact beats, start and end matching walk pose, no translation"
]
duration = 3
frame_count = 12
frame_indices = "3-15"
prefix = "walk_"
dest_dir = "characters/playable/mark/resources/sprites/walk"
match = "characters/playable/mark/resources/sprites/idle/idle_00.png"

[[animation]]
name = "turn"
# Workaround language: "pivot in place" avoids side translation.
prompt_variations = [
  "Character pivots in place to turn from facing right to facing left, heavy footwork pivot, blue flame aura flares briefly then settles, no translation",
  "Character quick step-turn in place, feet stay on baseline, short blue flame trail accent, no translation",
  "Character turns in place without translation, grounded brawler stance, subtle red ember sparks on the turn beat",
  "Character turns in place with minimal foot shuffle, blue flame flicker around fists, no translation"
]
duration = 3
frame_count = 3
end_image = "flip"
frame_indices = "12,23,29"
prefix = "turnaround_"
dest_dir = "characters/playable/mark/resources/sprites/turn_around"
match = "characters/playable/mark/resources/sprites/idle/idle_00.png"

[[animation]]
name = "hurt_mid"
prompt_variations = [
  "Character flinches from a mid hit, quick recoil, feet planted, blue flame aura sputters with red sparks, in place with no translation",
  "Character reacts to a mid hit, short sharp recoil, grounded, blue flame flicker breaks then reforms, no translation",
  "Character mid-hit flinch, brief recoil, a few red ember sparks, in place with no translation",
  "Character recoils from a mid strike, heavy stance, blue flame aura dims momentarily, no translation"
]
duration = 3
frame_count = 1
frame_indices = "14"
prefix = "hurt_mid"
single_frame = true
dest_dir = "characters/playable/mark/resources/sprites/hurt"
match = "characters/playable/mark/resources/sprites/idle/idle_00.png"

[[animation]]
name = "hurt_high"
prompt_variations = [
  "Character flinches from a high hit, quick recoil, feet planted, blue flame aura sputters with red sparks, in place with no translation",
  "Character reacts to a high hit, brief recoil, grounded, blue flame flicker breaks then reforms, no translation",
  "Character high-hit flinch, short recoil, a few red ember sparks, in place with no translation",
  "Character recoils from a high strike, heavy stance, blue flame aura dims momentarily, no translation"
]
duration = 3
frame_count = 1
frame_indices = "12"
prefix = "hurt_high"
single_frame = true
dest_dir = "characters/playable/mark/resources/sprites/hurt"
match = "characters/playable/mark/resources/sprites/idle/idle_00.png"

[[animation]]
name = "jump"
# Workaround language: "levitate in place" keeps center-of-mass stable in frame.
prompt_variations = [
  "Character levitates in-place without translating within the frame: squat, lift, hover, land, heavy brawler style, blue flame aura intensifies during hover with a few red embers",
  "Character levitates in-place without translating within the frame: slow rise, brief hover, gentle drop, land, blue flame aura and subtle red energy sparks",
  "Character levitate-jump in place without translating within the frame: compress, lift, hover, land, blue flame flare as the body extends, contained inside the border",
  "Character levitates in-place without translating within the frame: subtle floating arc and landing, blue flame flicker around fists with occasional red embers"
]
duration = 5
frame_count = 4
frame_indices = "9,15,19,32"
prefix = "jump_"
output_start = 1
dest_dir = "characters/playable/mark/resources/sprites/jump"
match = "characters/playable/mark/resources/sprites/idle/idle_00.png"

[[animation]]
name = "air_attack"
# Workaround language: "starts levitating" keeps airborne pose without translation.
prompt_variations = [
  "Character starts levitating in place, then performs a heavy flying kick, blue flame arc along the kicking leg and a few red ember sparks, remains off the ground, no translation and lands",
  "Character levitates in place and executes a heavy flying kick, clear silhouette, blue flame trail and red embers, no translation and lands",
  "Character hovers in place, then performs a flying kick, remains airborne, blue flame swirl contained inside the border, no translation and lands",
  "Character floating in place, then flying kick, stays centered in frame, blue flame flare at extension and a few red embers, no translation and lands"
]
duration = 5
frame_count = 2
prefix = "air_attack_"
frame_indices = "11,13"
dest_dir = "characters/playable/mark/resources/sprites/air_attack"
match = "characters/playable/mark/resources/sprites/idle/idle_00.png"

[[animation]]
name = "punch1"
prompt_variations = [
  "Character performs a quick heavy jab in place without translation, blue flames ignite on the fist with a tiny red ember burst at impact, start and end in neutral stance",
  "Character short body jab in place, grounded, blue flame flare and red sparks at the hit beat, no translation, start and end neutral",
  "Character light brawler punch in place, slight shoulder twist, blue flame streak and a few red embers, no translation",
  "Character quick heavy jab in place, grounded, blue flame punch with a small red fireburst accent, no translation"
]
duration = 3
frame_count = 2
frame_indices = "15,18"
prefix = "punch1_"
dest_dir = "characters/playable/mark/resources/sprites/punches"
match = "characters/playable/mark/resources/sprites/idle/idle_00.png"

[[animation]]
name = "punch2"
prompt_variations = [
  "Character performs a high kick in place without translation, blue flame arc along the leg and a few red embers, start and end in neutral stance",
  "Character high kick in place, grounded, blue flame trail and red sparks at extension, no translation, start and end neutral",
  "Character quick high kick in place, blue flame streak and a small red fireburst accent, no translation, end neutral",
  "Character high roundhouse in place, dramatic blue flame crescent trail with red embers, no translation, end neutral"
]
duration = 3
extract_fps = 24
frame_count = 2
frame_indices = "23,30"
prefix = "punch2_"
dest_dir = "characters/playable/mark/resources/sprites/punches"
match = "characters/playable/mark/resources/sprites/idle/idle_00.png"

[[animation]]
name = "punch3"
# Workaround language: "in place" for big brawler finisher to keep center stable.
prompt_variations = [
  "Character executes a heavy uppercut finisher in place, blue flames erupt around the fist with a compact red fireball burst, no translation, start grounded and end grounded",
  "Character performs a brawler finisher in place (overhand smash), dramatic blue flame flare on impact with red ember sparks, no translation, start and end grounded",
  "Character does a spinning power punch in place, blue flame spiral trail and red embers, no translation, start and end grounded",
  "Character unleashes a heavy hook in place, blue flames lick along the arm with a small red fireburst accent, no translation, end grounded",
  "Character does a dragon-punch style uppercut in place, intense blue flame column with red embers (contained inside the border), no translation, end grounded",
  "Character performs a heavy spinning kick in place, blue flame crescent trail and red sparks, no translation, end grounded"
]
duration = 5
frame_count = 4
frame_indices = "49,24,34,39"
prefix = "punch3_"
dest_dir = "characters/playable/mark/resources/sprites/punches"
match = "characters/playable/mark/resources/sprites/idle/idle_00.png"

[[animation]]
name = "knockout"
# Workaround language: keep center-of-mass stable; fall via pose change, not translation.
prompt_variations = [
  "Character takes a knockout hit and collapses in place, ending motionless on the floor; blue flame aura sputters out with a few red sparks, keep the character centered in frame (no translation), no dust or debris",
  "Character is stunned and drops to the floor in place, ending still; blue flame flicker fades and red sparks pop briefly, keep the character centered in frame (no translation), no dust or debris",
  "Character loses balance and falls in place, ending motionless; blue flame aura dims to nothing, a few red embers, keep the character centered in frame (no translation), no dust or debris",
  "Character gets knocked out and lands on the floor in place, ending still; blue flame aura cuts out with red sparks, keep the character centered in frame (no translation), no dust or debris"
]
duration = 3
frame_count = 6
end_image = "none"
frame_indices = "10,12,13,15,16,60"
prefix = "knockout_"
dest_dir = "characters/playable/mark/resources/sprites/knock_out"
match = "characters/playable/mark/resources/sprites/idle/idle_00.png"
